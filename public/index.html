<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>YouTube Studio Panel</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍆</text></svg>">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="container">
		<div class="header">
			<div class="dot"></div>
			<h1>YouTube Studio</h1>
			<span class="sse-status" id="sseStatus">● disconnected</span>
		</div>

		<!-- Phase 1: Proxies -->
		<div class="section">
			<h2>Proxies</h2>
			<div class="row">
				<input type="text" id="proxyAccess" placeholder="host:port:user:pass" style="min-width:350px">
				<input type="text" id="proxyLabel" placeholder="Label (e.g. US Res 1)">
				<button onclick="addProxy()">+ Add Proxy</button>
			</div>
			<table id="proxyTable">
				<thead>
				<tr>
					<th>Label</th>
					<th>URL</th>
					<th>Ping</th>
					<th></th>
				</tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<!-- Phase 1: Accounts -->
		<div class="section">
			<h2>Accounts</h2>

			<div class="row">
				<input type="email" id="accountEmail" placeholder="user@gmail.com" style="min-width: 350px;">
				<select id="accountProxy" style="min-width:200px">
					<option value="">No proxy</option>
				</select>
				<button onclick="addAccount()">+ Add Account</button>
				<button class="warning" onclick="syncAccounts()" style="margin-left:auto">↺ Sync</button>
			</div>

			<table id="accountTable">
				<thead>
				<tr>
					<th>Email</th>
					<th>Proxy</th>
					<th>Status</th>
					<th>Actions</th>
				</tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<!-- Phase 2: Automation -->
		<div class="section automation">
			<h2>Automation</h2>

			<!-- Выбор аккаунта -->
			<div class="row" style="margin-bottom:16px">
				<label style="align-self:center;color:#888;font-size:0.88rem">Account:</label>
				<select id="runAccount" onchange="updateRunBtn()">
					<option value="">— select account —</option>
				</select>
				<button class="warning" onclick="loadVideos()" style="margin-left: auto">↺ Update</button>
			</div>

			<!-- Video folder list -->
			<div id="videoList" style="margin-bottom:8px">Loading videos...</div>

			<div class="row" style="margin-top:16px">
				<button class="primary" id="runBtn" onclick="runAutomation()">▶ Run</button>
				<span id="runBtnHint" style="display:none;color:#f5a623;font-size:0.85rem;align-self:center">Assign a proxy to this account first</span>
			</div>

			<div class="log" id="runLog">
				<div class="log-entry info">Waiting for run...</div>
			</div>
		</div>
	</div>

	<script src="scripts.js"></script>
</body>
</html>
